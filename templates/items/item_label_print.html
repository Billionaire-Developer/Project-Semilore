{% extends "base.html" %}
{% block title %}Label {{ item.uid }}{% endblock %}
{% block body_class %}{% endblock %}

{% block content %}
<div class="text-center no-print mb-3">
  <button onclick="window.print()" class="btn btn-primary"><i class="bi bi-printer"></i> Print</button>
  <a href="{% url 'item-detail' item.pk %}" class="btn btn-outline-secondary">Back</a>
</div>
<div class="qr-label">
  <div class="small text-uppercase text-muted mb-2">University Inventory</div>
  <div class="uid">{{ item.uid }}</div>
  <div class="mb-2">{{ item.name }}</div>
  {% if item.qr_code_image %}
    <img src="{{ item.qr_code_image.url }}" alt="QR" style="width:160px;height:160px">
  {% endif %}
  <div class="small mt-2 text-muted">Scan to verify · {{ item.department.name }}</div>
</div>
{% endblock %}
